<!DOCTYPE html>

<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>NFC名片管理</title>

<style>

body{
font-family:sans-serif;
background:#f2f3f7;
margin:0;
padding:20px;
}

.card{
max-width:420px;
margin:auto;
background:white;
padding:24px;
border-radius:16px;
box-shadow:0 10px 30px rgba(0,0,0,.1);
}

h2{
text-align:center;
}

input{
width:100%;
padding:12px;
margin:8px 0;
border:1px solid #ddd;
border-radius:8px;
font-size:16px;
}

button{
width:100%;
padding:14px;
margin-top:10px;
border:none;
border-radius:8px;
background:black;
color:white;
font-size:16px;
}

.section{
display:none;
}

</style>

</head>

<body>

<div class="card">

<h2>NFC名片後台</h2>

<div id="login">

<input id="id" placeholder="ID">
<input id="key" placeholder="KEY">

<button onclick="login()">登入</button>

</div>

<div id="edit" class="section">

<input id="name" placeholder="姓名">
<input id="company" placeholder="公司">
<input id="title" placeholder="職稱">
<input id="phone" placeholder="電話">
<input id="email" placeholder="Email">
<input id="address" placeholder="地址">
<input id="website" placeholder="網站">

<button onclick="update()">儲存修改</button>

</div>

</div>

<script>

const API="https://script.google.com/macros/s/AKfycbzuddqEBpMiM_FvRPnWsgydPOV-LjUyxSJOeiUUvLuFB0gZIosW9zT3-EY_3eeNlm1VhQ/exec"

function login(){

fetch(API,{
method:"POST",
body:JSON.stringify({

action:"login",
id:id.value,
key:key.value

})
})
.then(r=>r.json())
.then(d=>{

if(d.status=="success"){

login.style.display="none"
edit.style.display="block"

name.value=d.user[2]
company.value=d.user[3]
title.value=d.user[4]
phone.value=d.user[5]
email.value=d.user[6]
address.value=d.user[7]
website.value=d.user[8]

}

else{

alert("登入失敗")

}

})

}

function update(){

fetch(API,{
method:"POST",
body:JSON.stringify({

action:"update",

id:id.value,
key:key.value,

name:name.value,
company:company.value,
title:title.value,
phone:phone.value,
email:email.value,
address:address.value,
website:website.value

})
})

alert("更新成功")

}

</script>

</body>
</html>
